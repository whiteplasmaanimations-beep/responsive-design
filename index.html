<!DOCTYPE html>
<html>
<head>
  <title>My World</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      text-align: center;
      color: white;
      overflow-x: hidden;

      background: linear-gradient(to bottom, #87ceeb, #0b3d5c);
    }

    h2 {
      margin-top: 60px;
    }

    .worlds {
      margin-top: 40px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      align-items: center;
    }

    a {
      text-decoration: none;
      color: white;
      background: rgba(255,255,255,0.2);
      padding: 15px 30px;
      border-radius: 12px;
      width: 220px;
      transition: 0.2s;
      display: inline-block;
    }

    a:hover {
      background: rgba(255,255,255,0.4);
      transform: scale(1.05);
    }
  </style>
</head>

<body>

  <h2>My World</h2>

  <div class="worlds">
    <a href="sky/">Sky</a>
    <a href="water/">Water</a>
    <a href="sweden/">Sweden</a>
    <a href="marshall-islands/">Marshall Islands</a>
  </div>

</body>
</html>
