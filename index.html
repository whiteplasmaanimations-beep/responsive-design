<!DOCTYPE html>
<html>
<head>
  <title>World Hub</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: white;
      background: #111;
    }

    h1 {
      text-align: center;
      margin: 40px 0;
    }

    .world {
      padding: 60px 20px;
      border-top: 2px solid rgba(255,255,255,0.1);
    }

    .title {
      font-size: 28px;
      margin-bottom: 20px;
      text-align: center;
    }

    .items {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 12px;
    }

    .item {
      padding: 12px 16px;
      background: rgba(255,255,255,0.15);
      border-radius: 10px;
      font-size: 18px;
    }

    /* Background sections */
    #sky { background: linear-gradient(to bottom, #87ceeb, #4da6ff); }
    #water { background: linear-gradient(to bottom, #00334d, #0099cc); }
    #sweden { background: linear-gradient(to bottom, #0b3d91, #1a7f3c); }
    #islands { background: linear-gradient(to bottom, #0b6b8d, #87ceeb); }

  </style>
</head>

<body>

<h1>🌍 World Hub (Full View)</h1>

<!-- SKY -->
<div class="world" id="sky">
  <div class="title">☁️ Sky</div>
  <div class="items">
    <div class="item">✈️ Plane</div>
    <div class="item">☁️ Cloud</div>
    <div class="item">✈️ Plane</div>
    <div class="item">☁️ Cloud</div>
  </div>
</div>

<!-- WATER -->
<div class="world" id="water">
  <div class="title">🌊 Water</div>
  <div class="items">
    <div class="item">🚤 Boat</div>
    <div class="item">🦈 Shark</div>
    <div class="item">⛽ Rig</div>
    <div class="item">🌊 Waves</div>
  </div>
</div>

<!-- SWEDEN -->
<div class="world" id="sweden">
  <div class="title">🇸🇪 Sweden</div>
  <div class="items">
    <div class="item">🌲 Tree</div>
    <div class="item">🌿 Grass</div>
    <div class="item">⛽ Rig</div>
    <div class="item">❄️ Wind</div>
  </div>
</div>

<!-- ISLANDS -->
<div class="world" id="islands">
  <div class="title">🏝 Marshall Islands</div>
  <div class="items">
    <div class="item">🚤 Boat</div>
    <div class="item">🌴 Palm Tree</div>
    <div class="item">🏝 Heightfield</div>
    <div class="item">🌊 Shore</div>
  </div>
</div>

</body>
</html>
