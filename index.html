<!DOCTYPE html>
<html>
<head>
  <title>My World</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      text-align: center;
      background: linear-gradient(to bottom, #87ceeb, #1b3c59);
      color: white;
    }

    h1 {
      margin-top: 50px;
      font-size: 40px;
    }

    .worlds {
      margin-top: 40px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      align-items: center;
    }

    a {
      text-decoration: none;
      color: white;
      background: rgba(255,255,255,0.2);
      padding: 15px 30px;
      border-radius: 12px;
      width: 200px;
      transition: 0.2s;
    }

    a:hover {
      background: rgba(255,255,255,0.4);
      transform: scale(1.05);
    }
  </style>
</head>

<body>
  <h1>My World</h1>

  <div class="worlds">
    <a href="sky/">Sky</a>
    <a href="water/">Water</a>
    <a href="sweden/">Sweden</a>
    <a href="marshall-islands/">Marshall Islands</a>
  </div>
</body>
</html>
