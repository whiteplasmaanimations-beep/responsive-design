<!DOCTYPE html>
<html>
<head>
  <title>Capstone Project Structure</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(to bottom, #0b3d5c, #000);
      color: white;
      text-align: center;
      margin: 0;
      padding: 40px;
    }

    h1 {
      margin-bottom: 30px;
    }

    .folder {
      cursor: pointer;
      margin: 10px auto;
      padding: 10px;
      width: 300px;
      border-radius: 10px;
      background: rgba(255,255,255,0.1);
      transition: 0.3s;
    }

    .folder:hover {
      background: rgba(255,255,255,0.2);
    }

    .content {
      display: none;
      margin-left: 20px;
      margin-top: 10px;
    }

    .item {
      margin: 5px 0;
      opacity: 0.9;
    }
  </style>
</head>

<body>

<h1>🎬 Capstone Animation Project</h1>

<!-- MAIN FOLDER -->
<div class="folder" onclick="toggle('main')">
  📁 Capstone_Project
</div>

<div id="main" class="content">

  <!-- SKY WATER -->
  <div class="folder" onclick="toggle('sky')">
    🌌 Sky_Water
  </div>

  <div id="sky" class="content">
    <div class="item">🚤 Boat</div>
    <div class="item">🌊 Water</div>
    <div class="item">🦈 Sharks</div>
    <div class="item">✈️ Planes</div>
    <div class="item">☁️ Clouds</div>
    <div class="item">🎭 Rigs</div>
  </div>

  <!-- SWEDEN -->
  <div class="folder" onclick="toggle('sweden')">
    🇸🇪 Sweden
  </div>

  <div id="sweden" class="content">
    <div class="item">🌿 Grass</div>
    <div class="item">🌲 Trees</div>
    <div class="item">⛰️ Mountains</div>
  </div>

</div>

<script>
  function toggle(id) {
    event.stopPropagation(); // prevents parent folders from toggling
    var element = document.getElementById(id);

    if (element.style.display === "block") {
      element.style.display = "none";
    } else {
      element.style.display = "block";
    }
  }
</script>

</body>
</html>
